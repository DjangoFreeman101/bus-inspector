<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>בודק אוטובוס</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }

    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    #map {
      height: calc(100vh - 50px);
      width: 100%;
    }

    .popup-box { text-align: center; min-width: 200px; }
    .popup-name { font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #1a1a2e; }
    .popup-status { font-size: 13px; margin-bottom: 4px; color: #555; }
    .popup-votes { font-size: 12px; color: #888; margin-bottom: 12px; }
    .popup-buttons { display: flex; gap: 8px; justify-content: center; }
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-red   { background: #e74c3c; color: white; }
    .btn-green { background: #27ae60; color: white; }
  </style>
</head>
<body>

<div id="header">🚌 בודק אוטובוס — ראשון לציון</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Generate or retrieve persistent user ID
  let userId = localStorage.getItem('bus_inspector_uid');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).substr(2, 12);
    localStorage.setItem('bus_inspector_uid', userId);
  }

  // --- Service Worker registration ---
  let swRegistration = null;

  async function setupServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    try {
      swRegistration = await navigator.serviceWorker.register('/sw.js');

      // Listen for messages from service worker (e.g. open prompt from notification tap)
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'OPEN_PROMPT' && event.data.stationId) {
          const station = stationsData.find(s => s.id === event.data.stationId);
          if (station && !promptShown) showProximityPrompt(station);
        }
      });
    } catch (err) {
      console.log('SW registration failed:', err);
    }
  }

  async function requestNotificationPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      await Notification.requestPermission();
    }
  }

  async function sendProximityNotification(station) {
    if (!swRegistration) return;
    if (Notification.permission !== 'granted') return;
    const reg = await navigator.serviceWorker.ready;
    reg.active.postMessage({
      type: 'SHOW_NOTIFICATION',
      stationName: station.name,
      stationId: station.id
    });
  }

  setupServiceWorker();
  requestNotificationPermission();

  const map = L.map('map').setView([31.9730, 34.7895], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // --- Live user location + proximity detection ---
  let userMarker = null;
  let userLat = null;
  let userLon = null;

  // Proximity state
  const PROXIMITY_METERS = 50;        // how close to trigger (meters)
  const NEAR_DURATION_MS = 20 * 1000; // 20 seconds near station before prompt
  const SNOOZE_MS = 5 * 60 * 1000;   // 5 minutes before asking again
  const BOX_DEG = 0.005;              // ~500m bounding box in degrees

  // Persist proximity state in localStorage so it survives app reopens
  let nearStationId = localStorage.getItem('nearStationId') ? parseInt(localStorage.getItem('nearStationId')) : null;
  let nearSince = localStorage.getItem('nearSince') ? parseInt(localStorage.getItem('nearSince')) : null;
  let snoozedStations = JSON.parse(localStorage.getItem('snoozedStations') || '{}');
  let stationsData = [];          // latest stations list from server
  let promptShown = false;        // is prompt currently visible?

  // Haversine distance in meters between two lat/lon points
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function checkProximity() {
    if (userLat === null || stationsData.length === 0 || promptShown) return;


    const now = Date.now();

    // Step 1: bounding box pre-filter (cheap)
    const candidates = stationsData.filter(s =>
      Math.abs(s.lat - userLat) < BOX_DEG &&
      Math.abs(s.lon - userLon) < BOX_DEG
    );

    // Step 2: precise Haversine on candidates only
    let closest = null;
    let closestDist = Infinity;
    for (const s of candidates) {
      const dist = haversine(userLat, userLon, s.lat, s.lon);
      if (dist < closestDist) {
        closestDist = dist;
        closest = s;
      }
    }


    if (closest && closestDist <= PROXIMITY_METERS) {
      // Check if snoozed
      if (snoozedStations[closest.id] && now - snoozedStations[closest.id] < SNOOZE_MS) return;

      if (nearStationId !== closest.id) {
        // Just arrived near this station
        nearStationId = closest.id;
        nearSince = now;
        localStorage.setItem('nearStationId', nearStationId);
        localStorage.setItem('nearSince', nearSince);
      } else if (now - nearSince >= NEAR_DURATION_MS) {
        // Been here for 1 minute — show notification + in-app prompt
        sendProximityNotification(closest);
        showProximityPrompt(closest);
      }
    } else {
      // Not near any station
      nearStationId = null;
      nearSince = null;
      localStorage.removeItem('nearStationId');
      localStorage.removeItem('nearSince');
    }
  }

  // Get N closest stations to user, excluding a given station id
  function getClosestStations(excludeId, count) {
    return stationsData
      .filter(s => s.id !== excludeId)
      .map(s => ({
        ...s,
        dist: haversine(userLat, userLon, s.lat, s.lon)
      }))
      .sort((a, b) => a.dist - b.dist)
      .slice(0, count);
  }

  async function submitReport(stationId, hasInspector) {
    await fetch('/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ station_id: stationId, has_inspector: hasInspector, user_id: userId })
    });
    loadStations();
  }

  function showInspectorPrompt(station, overlay) {
    const card = overlay.querySelector('.prompt-card');
    card.innerHTML = `
      <div style="font-size: 32px; margin-bottom: 12px;">🚌</div>
      <div style="font-size: 16px; font-weight: bold; color: #1a1a2e; margin-bottom: 8px;">
        נראה שאתה ב${station.name}
      </div>
      <div style="font-size: 14px; color: #666; margin-bottom: 20px;">
        יש בודק?
      </div>
      <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="prox-yes" style="
          background: #e74c3c; color: white; border: none;
          padding: 10px 18px; border-radius: 8px;
          font-size: 14px; font-weight: bold; cursor: pointer;
        ">🚨 יש בודק</button>
        <button class="prox-no" style="
          background: #27ae60; color: white; border: none;
          padding: 10px 18px; border-radius: 8px;
          font-size: 14px; font-weight: bold; cursor: pointer;
        ">✅ נקי</button>
      </div>
      <div style="margin-top: 12px;">
        <button class="prox-wrong" style="
          background: none; border: 1px solid #ddd; color: #555;
          padding: 8px 14px; border-radius: 8px;
          font-size: 13px; cursor: pointer; margin-bottom: 8px;
        ">📍 זו לא התחנה שלי</button>
      </div>
      <div style="margin-top: 4px;">
        <button class="prox-dismiss" style="
          background: none; border: none; color: #bbb;
          font-size: 13px; cursor: pointer;
        ">דלג</button>
      </div>
    `;

    function close() {
      document.body.removeChild(overlay);
      promptShown = false;
    }

    card.querySelector('.prox-yes').onclick = async () => {
      await submitReport(station.id, true);
      close();
    };

    card.querySelector('.prox-no').onclick = async () => {
      await submitReport(station.id, false);
      close();
    };

    card.querySelector('.prox-dismiss').onclick = close;

    card.querySelector('.prox-wrong').onclick = () => {
      showStationPickerPrompt(station, overlay);
    };
  }

  function showStationPickerPrompt(excludeStation, overlay) {
    const closest3 = getClosestStations(excludeStation.id, 3);
    const card = overlay.querySelector('.prompt-card');

    const stationButtons = closest3.map((s, i) => `
      <button class="pick-station" data-index="${i}" style="
        display: block; width: 100%; text-align: right;
        background: #f5f5f5; border: 1px solid #ddd; color: #1a1a2e;
        padding: 10px 14px; border-radius: 8px;
        font-size: 13px; cursor: pointer; margin-bottom: 8px;
      ">📍 ${s.name} <span style="color:#aaa; font-size:11px;">(${Math.round(s.dist)}מ')</span></button>
    `).join('');

    card.innerHTML = `
      <div style="font-size: 32px; margin-bottom: 12px;">📍</div>
      <div style="font-size: 15px; font-weight: bold; color: #1a1a2e; margin-bottom: 16px;">
        באיזו תחנה אתה נמצא?
      </div>
      <div style="direction: rtl;">
        ${stationButtons}
      </div>
      <div style="margin-top: 8px;">
        <button class="prox-dismiss" style="
          background: none; border: none; color: #bbb;
          font-size: 13px; cursor: pointer;
        ">דלג</button>
      </div>
    `;

    function close() {
      document.body.removeChild(overlay);
      promptShown = false;
    }

    card.querySelector('.prox-dismiss').onclick = close;

    card.querySelectorAll('.pick-station').forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.dataset.index);
        const chosenStation = closest3[idx];
        snoozedStations[chosenStation.id] = Date.now();
        showInspectorPrompt(chosenStation, overlay);
      };
    });
  }

  function showProximityPrompt(station) {
    promptShown = true;
    snoozedStations[station.id] = Date.now();
    localStorage.setItem('snoozedStations', JSON.stringify(snoozedStations));

    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
    `;
    overlay.innerHTML = `
      <div class="prompt-card" style="
        background: white; border-radius: 16px;
        padding: 28px 24px; max-width: 300px; width: 90%;
        text-align: center; direction: rtl;
      "></div>
    `;

    document.body.appendChild(overlay);
    showInspectorPrompt(station, overlay);
  }

  function startLocationTracking() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(
      (pos) => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        if (!userMarker) {
          const userIcon = L.divIcon({
            html: `<div style="
              width: 18px; height: 18px;
              background: #2980b9;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 0 6px rgba(0,0,0,0.4);
            "></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9],
            className: ''
          });
          userMarker = L.marker([userLat, userLon], { icon: userIcon, zIndexOffset: 1000 })
            .addTo(map)
            .bindPopup('📍 אתה כאן');
        } else {
          userMarker.setLatLng([userLat, userLon]);
        }
      },
      (err) => console.log('Location error:', err),
      { enableHighAccuracy: true, maximumAge: 5000 }
    );

    // Check proximity every 30 seconds
    setInterval(checkProximity, 30000);
  }

  startLocationTracking();

  // --- Station markers ---
  function makeIcon(hasInspector) {
    const color = hasInspector === true ? '#e74c3c' : hasInspector === false ? '#27ae60' : '#95a5a6';
    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
        <path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 22 14 22S28 24.5 28 14C28 6.27 21.73 0 14 0z" fill="${color}"/>
        <circle cx="14" cy="14" r="7" fill="white"/>
      </svg>`;
    return L.divIcon({
      html: svg,
      iconSize: [28, 36],
      iconAnchor: [14, 36],
      popupAnchor: [0, -36],
      className: ''
    });
  }

  function statusText(s) {
    if (s.has_inspector === null) return '⚪ אין דיווח עדיין';
    let prob = '';
    if (s.total_votes >= 30) {
      const winningSide = s.has_inspector ? s.yes_votes : s.no_votes;
      const pct = Math.round((winningSide / s.total_votes) * 100);
      prob = ` (${pct}%)`;
    }
    if (s.has_inspector) return `🔴 יש בודק${prob}`;
    return `🟢 נקי${prob}`;
  }

  function votesText(s) {
    if (s.total_votes === 0) return '';
    return `${s.yes_votes} דיווחו יש בודק · ${s.no_votes} דיווחו נקי`;
  }

  async function report(stationId, hasInspector) {
    await fetch('/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ station_id: stationId, has_inspector: hasInspector, user_id: userId })
    });
    loadStations();
  }

  let markers = {};

  async function loadStations() {
    const res = await fetch('/stations');
    const stations = await res.json();
    stationsData = stations; // keep latest data for proximity checks

    stations.forEach(s => {
      const popupHTML = `
        <div class="popup-box">
          <div class="popup-name">${s.name}</div>
          <div class="popup-status">${statusText(s)}</div>
          <div class="popup-votes">${votesText(s)}</div>
          <div class="popup-buttons">
            <button class="btn btn-red"   onclick="report(${s.id}, true)">🚨 יש בודק</button>
            <button class="btn btn-green" onclick="report(${s.id}, false)">✅ נקי</button>
          </div>
        </div>`;

      if (markers[s.id]) {
        markers[s.id].setIcon(makeIcon(s.has_inspector));
        markers[s.id].setPopupContent(popupHTML);
      } else {
        const m = L.marker([s.lat, s.lon], { icon: makeIcon(s.has_inspector) })
          .addTo(map)
          .bindPopup(popupHTML);
        markers[s.id] = m;
      }
    });
  }

  loadStations();
  setInterval(loadStations, 15000); // refresh every 15 seconds

  // When user returns to the app, immediately check proximity
  // This handles the case where the browser throttled the interval while minimized
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      checkProximity();
    }
  });
</script>
</body>
</html>
